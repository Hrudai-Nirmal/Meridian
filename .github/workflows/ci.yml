name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build time
        run: echo "MERIDIAN_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Lint
        run: node ./node_modules/eslint/bin/eslint.js . --format stylish

      - name: Build
        run: node scripts/build.mjs
